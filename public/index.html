<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamerkenner</title>
    <script type="module" src="main.js" defer></script>
    <script type="module" src="src/modules/background.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="navbar-container"></div>

    <div class="stats-bar">
        <div>
            <h1 id="score">Pogingen: 0</h1>
            <h1 id="politici">Politici: 0/150</h1>
        </div>
    </div>
    <div id="cards-container"></div>
    <div id="fracties-container"></div>

    <dialog id="ending-modal">
        <div class="modal-content">
            <button class="close">&times;</button>
            <h2>Gefeliciteerd!</h2>
            <p>Je hebt alle politici gevonden!</p>
            <p>Je score: <span id="final-score">0</span></p>
            <div class="modal-buttons">
                <button id="restart-button">Opnieuw spelen</button>
                <button id="leaderboard-button">Bekijk Leaderboard</button>
            </div>
        </div>
    </dialog>
</body>
</html>
