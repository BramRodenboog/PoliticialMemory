<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registreer</title>

    <script type="module" src="main.js" defer></script>
    <script type="module" src="./src/modules/register.js" defer></script>
    <script type="module" src="src/modules/background.js" defer></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="navbar-container"></div>

    <div class="login-container">
        <h2>Registreer</h2>
        <form id="register-form" method="POST">
            <div class="form-group">
                <label for="username">Gebruikersnaam:</label>
                <input type="text" id="username" name="username" placeholder="Voer uw gebruikersnaam in" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Voer uw email in" required>
            </div>
            <div class="form-group">
                <label for="password">Wachtwoord:</label>
                <input type="password" id="password" name="password" placeholder="Voer uw wachtwoord in" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">Bevestig Wachtwoord:</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Bevestig uw wachtwoord" required>
            </div>
            <button type="submit">Maak Account</button>
            <div id="error-message" class="error-message" hidden></div>
        </form>
    </div>

</body>
</html>
