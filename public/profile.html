<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profiel</title>

    <script type="module" src="main.js" defer></script>
    <script type="module" src="src/modules/profile.js" defer></script>
    <script type="module" src="src/modules/background.js" defer></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="navbar-container"></div>

    <div class="profile-container">
        <h1>Profiel</h1>
        <p>Gebruikersnaam: <span id="username-display"></span></p>
        <p>Email: <span id="email-display"></span></p>
        <p>Beste score: <span id="score-display"></span></p>

        <div>
            <h2>Voorkeuren</h2>

            <div>
                <h4>Kies een achtergrond:</h4>

                <select id="animal-select">
                    <option value="" selected disabled>
                        Kies een optie
                    </option>
                    <option disabled>
                        ----------------------------------
                    </option>

                    <option value="">
                        Geen dier | Witte achtergrond
                    </option>

                    <optgroup label="Katten">
                        <option value="https://cataas.com/cat">
                            Kat
                        </option>

                        <option value="https://cataas.com/cat/orange">
                            Oranje kat
                        </option>

                        <option value="https://cataas.com/cat/black">
                            Zwarte kat
                        </option>
                    </optgroup>

                    <optgroup label="Honden">
                        <option value="https://images.dog.ceo/breeds/beagle/n02088364_11136.jpg">
                            Beagle
                        </option>

                        <option value="https://images.dog.ceo/breeds/husky/n02110185_1469.jpg">
                            Husky
                        </option>
                    </optgroup>
                </select>
                
            </div>

            <div>
                <h4>Kies een kleur voor de fracties:</h4>

                <select id="color-found-select">
                    <option value="" selected disabled>
                        Kies een optie
                    </option>
                    <option disabled>
                        ----------------------------------
                    </option>

                    <option value="url('/assets/red-card-background.jpeg')">
                        Rode speelkaart
                    </option>

                    <option value="url('/assets/blue-card-background.jpeg')">
                        Blauwe speelkaart
                    </option>
                </select>
            </div>

            <div>
                <h4>Kies een kleur voor de personages:</h4>

                <select id="color-closed-select">
                    <option value="" selected disabled>
                        Kies een optie
                    </option>
                    <option disabled>
                        ----------------------------------
                    </option>

                    <option value="url('/assets/red-card-background.jpeg')">
                        Rode speelkaart
                    </option>

                    <option value="url('/assets/blue-card-background.jpeg')">
                        Blauwe speelkaart
                    </option>
                </select>
            </div>

            <button id="save-background">
                Opslaan
            </button>
        </div>
        
    </div>
</body>
</html>
